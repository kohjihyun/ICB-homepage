<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICB – We Create a Market for Earth Nation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="home.css" />
</head>
<body>

  <!-- GNB -->
  <nav class="gnb" id="gnb">
    <div class="gnb-logo">
      <img class="logo-dark"  src="ICB_logo.png" alt="ICB" />
      <img class="logo-white" src="ICB_logo.png" alt="ICB" style="filter: invert(1) brightness(2);" />
    </div>
    <ul class="gnb-menu">
      <li><a href="#personal">PERSONAL</a></li>
      <li><a href="#business">BUSINESS</a></li>
      <li><a href="#company">COMPANY</a></li>
    </ul>
    <div class="gnb-lang">
      <div class="lang-kr-wrap">
        <span class="lang-dot"></span>
        <span class="lang-btn active" data-lang="kr">KR</span>
      </div>
      <div class="divider"></div>
      <span class="lang-btn" data-lang="en">EN</span>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero" id="hero">

    <!-- 배경 이미지 프레임 (Variant 6 → 7 → 3 애니메이션) -->
    <div class="hero-img-frame" id="heroImgFrame">
      <div class="hero-img-inner">
        <img src="bg.png" alt="ICB Building" />
        <div class="hero-overlay"></div>
      </div>
    </div>

    <!-- 히어로 텍스트 (제자리 컬러 전환) -->
    <div class="hero-text-wrap" id="heroTextWrap">
      <div class="hero-text" id="heroText">
        <h1>We Create a Market for Earth Nation</h1>
        <p>전세계를 더 가까이 이어주는 크로스보더 비즈니스의 미래 ICB</p>
        <p>가능성이 가능성으로 연결되는 미래, Earth Nation Market을 만들어 갑니다.</p>
      </div>
    </div>

    <!-- 스크롤 힌트 -->
    <div class="scroll-hint" id="scrollHint">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M10 4v12M4 10l6 6 6-6" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>SCROLL</span>
    </div>

  </section>

  <!-- Section 2 -->
  <section class="section-next" id="company">
    <div class="section-inner reveal">
      <h2>크로스보더 비즈니스의 미래를 만들어 갑니다</h2>
      <p>
        ICB는 전세계를 더 가까이 이어주는 크로스보더 비즈니스 플랫폼입니다.<br />
        가능성이 가능성으로 연결되는 미래, Earth Nation Market을 함께 만들어 갑니다.
      </p>
    </div>
  </section>

  <script src="home.js"></script>
</body>
</html>
